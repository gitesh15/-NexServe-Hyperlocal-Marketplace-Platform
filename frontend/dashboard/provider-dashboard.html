<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>NexServe Provider Dashboard</title>

    <link rel="stylesheet" href="./provider-dashboard.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>

  <body>
    <div class="bg-blur blur1"></div>
    <div class="bg-blur blur2"></div>

    <section class="dashboard">
      <!-- SIDEBAR -->

      <aside class="sidebar">
        <div class="logo">
          <div class="logo-icon">
            <i class="fa-solid fa-location-dot"></i>
          </div>

          <div>
            <h2>NexServe</h2>
            <span>Provider Panel</span>
          </div>
        </div>

        <div class="sidebar-menu">
          <button class="active-menu" id="dashboardBtn">
            <i class="fa-solid fa-house"></i>
            Dashboard
          </button>

          <button id="requestsBtn">
            <i class="fa-solid fa-calendar-check"></i>
            Requests
          </button>

          <button>
            <i class="fa-solid fa-wallet"></i>
            Earnings
          </button>

          <button>
            <i class="fa-solid fa-star"></i>
            Reviews
          </button>

          <button id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
          </button>
        </div>
      </aside>

      <!-- MAIN -->

      <main class="main-content">
        <!-- DASHBOARD PAGE -->

        <div id="dashboardSection">
          <!-- TOPBAR -->

          <div class="topbar">
            <div>
              <span class="welcome-tag"> Provider Workspace </span>

              <h1 id="providerName">Welcome Back</h1>
            </div>

            <div class="availability-box">
              <span>Availability</span>

              <label class="switch">
                <input type="checkbox" id="availabilityToggle" />

                <span class="slider"></span>
              </label>
            </div>
          </div>

          <!-- STATS -->

          <section class="stats-grid">
            <div class="stat-card">
              <h2 id="totalRequests">0</h2>
              <p>Total Requests</p>
            </div>

            <div class="stat-card">
              <h2 id="acceptedJobs">0</h2>
              <p>Accepted Jobs</p>
            </div>

            <div class="stat-card">
              <h2>4.9★</h2>
              <p>Rating</p>
            </div>

            <div class="stat-card">
              <h2>₹12K</h2>
              <p>This Month</p>
            </div>
          </section>
        </div>

        <!-- REQUESTS PAGE -->

        <div id="requestsSection" style="display: none">
          <div class="topbar">
            <div>
              <span class="welcome-tag"> Customer Requests </span>

              <h1>Incoming Requests</h1>
            </div>
          </div>

          <section class="requests-section">
            <div class="section-title">
              <h2>Booking Requests</h2>

              <span> Realtime Updates </span>
            </div>

            <div class="requests-grid" id="bookingRequests">
              <!-- DYNAMIC -->
            </div>
          </section>
        </div>
      </main>
    </section>

    <script src="./provider-dashboard.js"></script>
  </body>
</html>
