<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Find Services • NexServe</title>

    <link rel="stylesheet" href="../css//search-services.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>

  <body>
    <!-- BACKGROUND -->

    <div class="bg-blur blur-1"></div>

    <div class="bg-blur blur-2"></div>

    <!-- PAGE -->

    <main class="services-page">
      <!-- TOPBAR -->

      <header class="services-topbar">
        <button class="back-btn" onclick="window.history.back()">
          <i class="fa-solid fa-arrow-left"></i>
        </button>

        <div>
          <span class="top-label">NEXSERVE MARKETPLACE</span>

          <h1>Find Trusted Professionals</h1>
        </div>
      </header>

      <!-- SEARCH -->

      <section class="search-section">
        <div class="search-wrapper">
          <i class="fa-solid fa-magnifying-glass"></i>

          <input
            type="text"
            id="searchInput"
            placeholder="Search plumber, electrician, cleaner..."
          />

          <button id="searchBtn">Search</button>
        </div>

        <!-- CATEGORIES -->

        <div class="category-chips">
          <button class="chip-btn">Plumbing</button>

          <button class="chip-btn">Electrician</button>

          <button class="chip-btn">Cleaning</button>

          <button class="chip-btn">Carpentry</button>

          <button class="chip-btn">Tutoring</button>

          <button class="chip-btn">Appliance Repair</button>
        </div>
      </section>

      <!-- RESULTS -->

      <section class="results-section">
        <div class="results-header">
          <div>
            <span class="results-label"> LIVE PROVIDERS </span>

            <h2>Available Professionals</h2>
          </div>

          <div class="live-status">
            <span class="live-dot"></span>

            Live
          </div>
        </div>

        <div id="resultsCount" class="results-count">0 providers found</div>

        <div class="providers-grid" id="providersGrid">
          <!-- DYNAMIC -->
        </div>
      </section>
    </main>

    <script src="../js/search-services.js"></script>
  </body>
</html>
