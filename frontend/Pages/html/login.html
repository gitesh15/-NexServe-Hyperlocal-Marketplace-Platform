<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>NexServe Login</title>

    <link rel="stylesheet" href="../css/signup.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>

  <body>
    <section class="auth-page">
      <!-- LEFT -->

      <div class="hero-side">
        <div class="hero-content">
          <span class="tag"> NexServe Marketplace </span>

          <h1>Welcome back to NexServe</h1>

          <p>
            Login to continue booking and managing local professional services.
          </p>
        </div>
      </div>

      <!-- RIGHT -->

      <div class="auth-side">
        <div class="auth-card">
          <div class="card-header">
            <h1>Login</h1>

            <p>Access your dashboard</p>
          </div>

          <!-- ROLE SWITCH -->

          <div class="role-switch">
            <button class="active-role" id="customerRole">Customer</button>

            <button id="providerRole">Provider</button>
          </div>

          <!-- FORM -->

          <form class="auth-form" id="loginForm">
            <!-- EMAIL -->

            <div class="input-group">
              <label>Email</label>

              <div class="input-box">
                <i class="fa-regular fa-envelope"></i>

                <input
                  type="email"
                  placeholder="Enter email"
                  id="email"
                  required
                />
              </div>
            </div>

            <!-- PASSWORD -->

            <div class="input-group">
              <label>Password</label>

              <div class="input-box">
                <i class="fa-solid fa-lock"></i>

                <input
                  type="password"
                  placeholder="Enter password"
                  id="password"
                  required
                />
              </div>
            </div>

            <button type="submit" class="auth-btn">Login to Dashboard</button>
          </form>

          <p style="margin-top: 20px">
            Don't have an account?

            <a href="signup.html">Sign Up</a>
          </p>
        </div>
      </div>
    </section>

    <script src="../js/login.js"></script>
  </body>
</html>
