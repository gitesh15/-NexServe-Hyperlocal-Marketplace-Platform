<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>NexServe Profile</title>

    <link rel="stylesheet" href="profile.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>

  <body>
    <div class="bg-blur blur-1"></div>
    <div class="bg-blur blur-2"></div>

    <!-- TOPBAR -->

    <header class="topbar">
      <button class="back-btn" onclick="history.back()">
        <i class="fa-solid fa-arrow-left"></i>
      </button>

      <h2>NexServe Account</h2>

      <button class="menu-btn">
        <i class="fa-solid fa-gear"></i>
      </button>
    </header>

    <!-- PROFILE HERO -->

    <section class="profile-hero">
      <div class="profile-card">
        <img
          id="profileImage"
          src="https://i.pravatar.cc/300"
          class="profile-avatar"
        />

        <h1 id="profileName">Customer</h1>

        <p id="profileEmail">customer@nexserve.com</p>

        <div class="verified-badge">
          <i class="fa-solid fa-shield"></i>
          Verified Account
        </div>
      </div>
    </section>

    <!-- STATS -->

    <section class="stats-grid">
      <div class="stat-card">
        <h2 id="totalBookings">0</h2>
        <p>Total Bookings</p>
      </div>

      <div class="stat-card">
        <h2>Active</h2>
        <p>Account Status</p>
      </div>

      <div class="stat-card">
        <h2 id="savedCount">0</h2>
        <p>Saved Services</p>
      </div>
    </section>

    <!-- QUICK ACTIONS -->

    <section class="glass-section">
      <div class="section-header">
        <div>
          <span class="mini-label">QUICK ACTIONS</span>
          <h2>Manage Account</h2>
        </div>
      </div>

      <div class="quick-grid">
        <button
          class="quick-card"
          onclick="window.location.href = '../pages/search-services.html'"
        >
          <i class="fa-solid fa-magnifying-glass"></i>
          <span>Find Services</span>
        </button>

        <button
          class="quick-card"
          onclick="window.location.href = '../dashboard/bookings.html'"
        >
          <i class="fa-solid fa-calendar-check"></i>
          <span>My Bookings</span>
        </button>

        <button class="quick-card">
          <i class="fa-solid fa-heart"></i>
          <span>Saved Providers</span>
        </button>

        <button class="quick-card">
          <i class="fa-solid fa-user-pen"></i>
          <span>Edit Profile</span>
        </button>
      </div>
    </section>

    <!-- RECENT ACTIVITY -->

    <section class="glass-section">
      <div class="section-header">
        <div>
          <span class="mini-label">RECENT ACTIVITY</span>
          <h2>Latest Actions</h2>
        </div>
      </div>

      <div id="activityList" class="activity-list"></div>
    </section>

    <!-- LOGOUT -->

    <section class="logout-section">
      <button id="logoutBtn" class="logout-btn">
        <i class="fa-solid fa-right-from-bracket"></i>
        Logout Account
      </button>
    </section>

    <script src="profile.js"></script>
  </body>
</html>
